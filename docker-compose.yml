services:
  db:
    image: mysql:8.0
    container_name: prephub_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: prephub_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

volumes:
  db_data:
