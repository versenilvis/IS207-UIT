services:
  db:
    image: mysql:8.0
    container_name: prephub_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: prephub_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:80"
    volumes:
      - ./server:/var/www/html
    depends_on:
      - db

  frontend:
    image: php:8.2-apache
    container_name: prephub_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./client:/var/www/html
    command: /bin/sh -c "a2enmod rewrite && apache2-foreground"

volumes:
  db_data:
