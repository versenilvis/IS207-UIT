services:
  db:
    image: mysql:8.0
    container_name: prephub_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: prephub_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:80"
    volumes:
      - ./server:/var/www/html
    depends_on:
      - db

  frontend:
    image: oven/bun:latest
    container_name: prephub_frontend
    working_dir: /app/client
    volumes:
      - ./client:/app/client
    # tự động bật dev server tĩnh không cache
    command: /bin/sh -c "bunx --bun http-server -p 3000 -c-1"
    ports:
      - "3000:3000"

volumes:
  db_data:
